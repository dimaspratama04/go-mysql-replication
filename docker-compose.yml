services:
  # ─────────────────────────────────────────────────────────────────
  # MySQL 8 - Primary (Source)
  # Auto-runs migrations via docker-entrypoint-initdb.d
  # ─────────────────────────────────────────────────────────────────
  mysql-primary:
    image: mysql:8
    container_name: mysql-primary
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
      - ./config/mysql/primary.cnf:/etc/mysql/conf.d/primary.cnf:ro
    networks:
      - rnd-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway" # ← For replica to access primary on host

  # ─────────────────────────────────────────────────────────────────
  # MySQL 8 - Replica
  # Custom image: auto-configures GTID replication on first start
  # ─────────────────────────────────────────────────────────────────
  mysql-replica:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.replica
    image: mysql:8
    container_name: mysql-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_PRIMARY_HOST: mysql-primary
      MYSQL_PRIMARY_PORT: 3306
      MYSQL_REPL_USER: replicator
      MYSQL_REPL_PASSWORD: replicatorpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
      - ./config/mysql/replica.cnf:/etc/mysql/conf.d/replica.cnf:ro
    networks:
      - rnd-network
    depends_on:
      mysql-primary:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpassword",
        ]
    extra_hosts:
      - "host.docker.internal:host-gateway" # ← For replica to access primary on host

  # ─────────────────────────────────────────────────────────────────
  # Go Application (GoFiber)
  # Connects to Primary for all writes
  # ─────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: products-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - rnd-network
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  proxysql:
    image: proxysql/proxysql:latest
    container_name: proxysql
    ports:
      - "6032:6032"
      - "6033:6033"
      - "6070:6070"
    volumes:
      - ./config/mysql/proxysql.cnf:/etc/proxysql.cnf:ro
    restart: always
    networks:
      - rnd-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sql-orchestrator:
    image: percona/percona-orchestrator:latest
    container_name: sql-orchestrator
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ./config/mysql/orchestrator.conf.json:/etc/orchestrator/orchestrator.conf.json:ro
    networks:
      - rnd-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_primary_data:
    driver: local
  mysql_replica_data:
    driver: local

networks:
  rnd-network:
    driver: bridge
